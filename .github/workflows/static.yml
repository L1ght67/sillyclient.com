<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SillyClient</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: 'Press Start 2P', cursive;
        background: linear-gradient(#87CEEB, #3CB371);
        color: white;
        text-align: center;
    }

    header {
        padding: 120px 20px;
        background: #2e7d32;
        border-bottom: 6px solid #1b5e20;
    }

    h1 {
        font-size: 72px;
        margin: 0;
        color: #fff;
        text-shadow: 4px 4px #000;
    }

    p {
        color: #f0f0f0;
        font-size: 16px;
        margin-top: 20px;
        text-shadow: 2px 2px #000;
    }

    .download-btn {
        margin-top: 40px;
        padding: 20px 50px;
        font-size: 18px;
        border: 4px solid #000;
        background: #4CAF50;
        color: white;
        cursor: pointer;
        box-shadow: 4px 4px #000;
    }

    .download-btn:hover {
        background: #66bb6a;
    }

    .screenshot {
        margin: 80px auto;
        width: 90%;
        max-width: 900px;
        border: 6px solid #000;
        box-shadow: 8px 8px #000;
    }

    .features {
        margin-top: 40px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 40px;
        padding: 0 60px 100px;
    }

    .card {
        background: #2e7d32;
        padding: 40px;
        border: 4px solid #000;
        box-shadow: 6px 6px #000;
    }

    .card h3 {
        margin-bottom: 20px;
    }

    footer {
        padding: 30px;
        background: #1b5e20;
        font-size: 12px;
        border-top: 4px solid #000;
    }
</style>
</head>
<body>

<header>
    <h1>SillyClient</h1>
    <p>A fun and powerful Minecraft client</p>
    <button class="download-btn" onclick="download()">Download</button>
</header>

<img class="screenshot" src="https://images.unsplash.com/photo-1612831455549-4e8cfe2f7d33" alt="Minecraft Screenshot">

<section class="features">
    <div class="card">
        <h3>⚡ FPS Boost</h3>
        <p>Improves performance and reduces lag.</p>
    </div>
    <div class="card">
        <h3>🎮 Minecraft‑Style UI</h3>
        <p>Blocky and nostalgic design inspired by Minecraft.</p>
    </div>
    <div class="card">
        <h3>🛠 Custom Features</h3>
        <p>Includes unique tools and gameplay enhancements.</p>
    </div>
</section>

<footer>
    © 2026 SillyClient
</footer>

<script>
function download() {
    window.location.href = "#";
}
</script>

</body>
</html>
